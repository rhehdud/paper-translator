name: Weekly paper processing

on:
  schedule:
    # 매주 일요일 00:03 KST(=토요일 15:03 UTC) 시작.
    # 월요일 09:00 KST 배포·알림(publish_and_notify.yml)까지 33시간 버퍼를 둬서
    # 처리 시간(논문 길이에 따라 최대 ~4시간)이 언제 끝나든 영향받지 않게 함.
    - cron: "3 15 * * 6"
  workflow_dispatch: {}

concurrency:
  group: weekly-paper-processing
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      categories: ${{ steps.list.outputs.categories }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-collect.txt

      - run: pip install -r requirements-collect.txt

      - run: python src/collect.py --out-dir selected

      - id: list
        run: |
          python3 -c "
          import json, os
          files = sorted(os.listdir('selected'))
          cats = [f.replace('selected_', '').replace('.json', '') for f in files]
          print('categories=' + json.dumps(cats))
          " >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: selected-papers
          path: selected/

  # CPU 작업(Marker 추출)은 잡마다 자기 러너만 쓰니 매트릭스 병렬화가 실제로 이득이다.
  extract:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        category: ${{ fromJson(needs.collect.outputs.categories) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-extract.txt

      - uses: actions/download-artifact@v4
        with:
          name: selected-papers
          path: selected/

      - name: Cache marker/surya models
        uses: actions/cache@v4
        with:
          path: ~/.cache/datalab
          key: marker-models-${{ runner.os }}

      - name: Install CPU-only torch (avoid pulling multi-GB CUDA wheels on a GPU-less runner)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - run: pip install -r requirements-extract.txt

      - name: Extract (Marker)
        run: |
          python src/extract.py \
            --selected "selected/selected_${{ matrix.category }}.json" \
            --work-dir "work/${{ matrix.category }}" \
            --out "work/${{ matrix.category }}/extracted.md"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "extracted-${{ matrix.category }}"
          path: "work/${{ matrix.category }}/extracted.md"
          if-no-files-found: ignore # max_pages 초과로 건너뛴 경우 파일이 없을 수 있음

  # 번역은 NVIDIA API 키 하나를 공유하는 작업이라 병렬화해봐야 서로 부딪히기만 한다.
  # 잡 하나로 모아서 분야를 순서대로(for 루프) 하나씩 처리한다.
  translate_and_publish:
    needs: [collect, extract]
    runs-on: ubuntu-latest
    timeout-minutes: 180 # 청크 하나가 (5분 타임아웃 x 최대 5회 재시도)까지 걸릴 수 있어 여유를 둠
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-translate.txt

      - run: pip install -r requirements-translate.txt

      - uses: actions/download-artifact@v4
        with:
          name: selected-papers
          path: selected/

      - uses: actions/download-artifact@v4
        with:
          pattern: extracted-*
          path: extracted/

      - name: Translate & publish each category sequentially
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          rm -rf data/last_run
          mkdir -p data/last_run
          for category in $(echo '${{ needs.collect.outputs.categories }}' | python3 -c "import json,sys; print('\n'.join(json.load(sys.stdin)))"); do
            extracted_file="extracted/extracted-${category}/extracted.md"
            if [ ! -f "$extracted_file" ]; then
              echo "=== $category: 추출 결과 없음(페이지 상한 초과 등으로 건너뜀), 번역도 건너뜀 ==="
              continue
            fi
            echo "=== $category 번역 시작 ==="
            python src/translate.py \
              --input "$extracted_file" \
              --output "work/${category}/translated.md"
            python src/publish.py \
              --selected "selected/selected_${category}.json" \
              --translated "work/${category}/translated.md" \
              --docs-dir docs
            cp "selected/selected_${category}.json" data/last_run/
          done
          date -u +%Y-%m-%dT%H:%M:%SZ > data/last_run/generated_at.txt

      - name: Commit translated docs
        run: |
          git config user.name "paper-translator-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs data/last_run
          git commit -m "docs: weekly papers $(date -u +%Y-%m-%d)" || echo "커밋할 변경 없음"
          git push

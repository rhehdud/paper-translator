name: Weekly paper processing

on:
  schedule:
    # 매주 일요일 00:03 KST(=토요일 15:03 UTC) 시작.
    # 월요일 09:00 KST 배포·알림(publish_and_notify.yml)까지 33시간 버퍼를 둬서
    # 처리 시간(논문 길이에 따라 최대 ~4시간)이 언제 끝나든 영향받지 않게 함.
    - cron: "3 15 * * 6"
  workflow_dispatch: {}

concurrency:
  group: weekly-paper-processing
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      categories: ${{ steps.list.outputs.categories }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements-collect.txt

      - run: python src/collect.py --out-dir selected

      - id: list
        run: |
          python3 -c "
          import json, os
          files = sorted(os.listdir('selected'))
          cats = [f.replace('selected_', '').replace('.json', '') for f in files]
          print('categories=' + json.dumps(cats))
          " >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: selected-papers
          path: selected/

  process:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        category: ${{ fromJson(needs.collect.outputs.categories) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/download-artifact@v4
        with:
          name: selected-papers
          path: selected/

      - name: Cache marker/surya models
        uses: actions/cache@v4
        with:
          path: ~/.cache/datalab
          key: marker-models-${{ runner.os }}

      - run: pip install -r requirements.txt

      - name: Extract (Marker)
        run: |
          python src/extract.py \
            --selected "selected/selected_${{ matrix.category }}.json" \
            --work-dir "work/${{ matrix.category }}" \
            --out "work/${{ matrix.category }}/extracted.md"

      - name: Translate (NVIDIA NIM)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python src/translate.py \
            --input "work/${{ matrix.category }}/extracted.md" \
            --output "work/${{ matrix.category }}/translated.md"

      - name: Publish to docs/
        run: |
          python src/publish.py \
            --selected "selected/selected_${{ matrix.category }}.json" \
            --translated "work/${{ matrix.category }}/translated.md" \
            --docs-dir docs

      - uses: actions/upload-artifact@v4
        with:
          name: "docs-${{ matrix.category }}"
          path: docs/

  commit_docs:
    needs: [collect, process]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: docs-*
          path: downloaded_docs
          merge-multiple: true

      - name: Merge generated pages into docs/
        run: cp -r downloaded_docs/* docs/

      - uses: actions/download-artifact@v4
        with:
          name: selected-papers
          path: selected/

      - name: Record this run's selection for the Monday notify workflow
        run: |
          rm -rf data/last_run
          mkdir -p data/last_run
          cp selected/*.json data/last_run/
          date -u +%Y-%m-%dT%H:%M:%SZ > data/last_run/generated_at.txt

      - name: Commit translated docs
        run: |
          git config user.name "paper-translator-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs data/last_run
          git commit -m "docs: weekly papers $(date -u +%Y-%m-%d)" || echo "커밋할 변경 없음"
          git push

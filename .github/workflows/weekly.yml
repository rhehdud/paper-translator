name: Weekly paper processing

on:
  schedule:
    # 매주 일요일 00:03 KST(=토요일 15:03 UTC) 시작.
    # 월요일 09:00 KST 배포·알림(publish_and_notify.yml)까지 33시간 버퍼를 둬서
    # 처리 시간이 언제 끝나든 영향받지 않게 함.
    # 이 워크플로가 끝나면 (성공 시) translate.yml이 workflow_run으로 자동으로 이어받아 번역한다.
    - cron: "3 15 * * 6"
  workflow_dispatch: {}

concurrency:
  group: weekly-paper-processing
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      categories: ${{ steps.list.outputs.categories }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-collect.txt

      - run: pip install -r requirements-collect.txt

      - run: python src/collect.py --out-dir selected

      - id: list
        run: |
          python3 -c "
          import json, os
          files = sorted(os.listdir('selected'))
          cats = [f.replace('selected_', '').replace('.json', '') for f in files]
          print('categories=' + json.dumps(cats))
          " >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: selected-papers
          path: selected/

  # CPU 작업(Marker 추출)은 잡마다 자기 러너만 쓰니 매트릭스 병렬화가 실제로 이득이다.
  extract:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 360 # GitHub 호스팅 러너 잡의 플랫폼 하드 리밋(6시간)까지 최대한 여유
    strategy:
      fail-fast: false
      matrix:
        category: ${{ fromJson(needs.collect.outputs.categories) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-extract.txt

      - uses: actions/download-artifact@v4
        with:
          name: selected-papers
          path: selected/

      - name: Cache marker/surya models
        uses: actions/cache@v4
        with:
          path: ~/.cache/datalab
          key: marker-models-${{ runner.os }}

      - name: Install CPU-only torch (avoid pulling multi-GB CUDA wheels on a GPU-less runner)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - run: pip install -r requirements-extract.txt

      - name: Extract (Marker)
        run: |
          python src/extract.py \
            --selected "selected/selected_${{ matrix.category }}.json" \
            --work-dir "work/${{ matrix.category }}" \
            --out-dir "work/${{ matrix.category }}/output"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "extracted-${{ matrix.category }}"
          path: "work/${{ matrix.category }}/output" # 마크다운 + 이미지 전부 (extracted.md만이 아님)
          if-no-files-found: ignore # max_pages 초과로 건너뛴 경우 파일이 없을 수 있음
